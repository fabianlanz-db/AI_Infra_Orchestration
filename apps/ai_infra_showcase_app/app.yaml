command:
  - "streamlit"
  - "run"
  - "app.py"
env:
  - name: FM_ENDPOINT_NAME
    value: "databricks-meta-llama-3-3-70b-instruct"
  - name: VS_INDEX_NAME
    value: "serverless_stable_9gm5rx_catalog.ai_infra_agent_demo.ai_infra_kb_index"
  - name: LAKEBASE_ENDPOINT_RESOURCE
    value: "projects/ai-infra-agent-db/branches/production/endpoints/primary"
  - name: LAKEBASE_HOST
    value: "ep-damp-field-d2e58wc2.database.us-east-1.cloud.databricks.com"
  - name: LAKEBASE_DB_NAME
    value: "databricks_postgres"
  - name: LAKEBASE_DB_USER
    value: "ai_infra_app_user"
  # LAKEBASE_DB_PASSWORD is only used as a local-dev fallback. In Databricks Apps the
  # runtime resolves this via a secret reference; if unset, the app falls back to
  # WorkspaceClient-issued OAuth tokens (see LakebaseMemoryStore._connect).
  - name: LAKEBASE_DB_PASSWORD
    valueFrom: "lakebase_db_password"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Shared/ai-infra-fm-agent-demo"
